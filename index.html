<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Wedding Of Yani & Indah</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Pinyon+Script&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Cinzel',serif;
background:#1a0008;
color:white;
overflow:hidden;
scroll-behavior:smooth;
}

/* COVER PREMIUM */
.cover{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.9)),
url("cover.jpg") center/cover fixed;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
animation:zoom 6s ease;
}

@keyframes zoom{
from{transform:scale(1.2);}
to{transform:scale(1);}
}

/* GLASS BOX */
.box{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
padding:35px;
border-radius:25px;
border:1px solid rgba(255,215,0,0.5);
box-shadow:0 0 30px rgba(255,215,0,0.3);
animation:fadeUp 2s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;}
}

h1{
font-family:'Pinyon Script',cursive;
font-size:65px;
color:gold;
text-shadow:0 0 10px gold;
}

h3{
letter-spacing:3px;
margin-bottom:10px;
}

/* BUTTON */
button{
margin-top:25px;
padding:15px 40px;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#800020,gold);
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 15px gold;
transition:.3s;
}
button:hover{
transform:scale(1.1);
}

/* SECTION */
section{
padding:70px 20px;
text-align:center;
animation:fadeUp 2s ease;
}

/* COUNTDOWN */
#countdown{
font-size:30px;
color:gold;
margin-top:15px;
}

/* GALERI */
.gallery{
display:flex;
overflow-x:auto;
gap:15px;
padding:20px;
}
.gallery img{
height:300px;
border-radius:20px;
box-shadow:0 0 15px rgba(255,215,0,.5);
}

/* MAP */
iframe{
width:90%;
height:300px;
border-radius:20px;
margin-top:20px;
border:none;
}

/* PETAL */
.petal-container{
position:fixed;
top:0;left:0;
width:100%;height:100%;
pointer-events:none;
z-index:999;
}
.petal{
position:absolute;
width:25px;height:25px;
background:url("https://i.ibb.co/7QpKsCX/rose-petal.png");
background-size:cover;
animation:fall linear infinite;
}
@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(100vh) rotate(360deg);}
}
</style>
</head>

<body>

<!-- COVER -->
<div class="cover">
<div class="box">
<h3 id="to"></h3>
<h1>Yani & Indah</h1>
<p>24 September 2026</p>
<button onclick="buka()">Buka Undangan</button>
</div>
</div>

<!-- COUNTDOWN -->
<section>
<h2>Menuju Hari Bahagia</h2>
<div id="countdown"></div>
</section>

<!-- ACARA -->
<section>
<h2>Akad Nikah</h2>
<p>24 September 2026 - 09.00 WIB</p>
<p>Gresik</p>

<h2>Resepsi</h2>
<p>30 September 2026 - 10.00 WIB</p>
<p>Jombang</p>
</section>

<!-- MAP -->
<section>
<h2>Lokasi</h2>
<iframe src="https://maps.google.com/maps?q=gresik&output=embed"></iframe>
<iframe src="https://maps.google.com/maps?q=jombang&output=embed"></iframe>
</section>

<!-- GALERI -->
<section>
<h2>Galeri Prewedding</h2>
<div class="gallery">
<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
</div>
</section>

<!-- AMPLOP -->
<section>
<h2>Amplop Digital</h2>
<p>Bank BRI</p>
<p><b>002601169483507</b></p>
<p>a.n Kusuma Pujaningsih</p>
</section>

<!-- AUDIO -->
<audio id="musik" loop>
<source src="musik.mp3">
</audio>

<!-- PETAL -->
<div class="petal-container"></div>

<script>
function buka(){
document.body.style.overflow="auto";
document.getElementById("musik").play();
window.scrollTo({top:window.innerHeight,behavior:'smooth'});
}

/* COUNTDOWN */
const target=new Date("Sep 24, 2026 09:00:00").getTime();
setInterval(()=>{
let now=new Date().getTime();
let d=target-now;

let hari=Math.floor(d/(1000*60*60*24));
let jam=Math.floor((d%(1000*60*60*24))/(1000*60*60));
let menit=Math.floor((d%(1000*60*60))/(1000*60));
let detik=Math.floor((d%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
hari+" Hari "+jam+" Jam "+menit+" Menit "+detik+" Detik";
},1000);

/* NAMA TAMU */
const params=new URLSearchParams(window.location.search);
const nama=params.get('to');
if(nama){
document.getElementById("to").innerText="Kepada Yth: "+nama;
}

/* PETAL */
function createPetal(){
let p=document.createElement("div");
p.className="petal";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(Math.random()*5+5)+"s";
document.querySelector(".petal-container").appendChild(p);
setTimeout(()=>p.remove(),10000);
}
setInterval(createPetal,300);
</script>

</body>
</html>
